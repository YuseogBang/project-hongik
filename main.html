<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홍대 상권 분석 플랫폼</title>
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=0837551521646a85388e11c7360953a9&libraries=services,clusterer"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root {
    --bg: #2b070c;
    --surface: #3d0f16;
    --surface2: #4f151e;
    --border: #7a2534;
    --accent: #e8362a;
    --accent2: #ff5c46;
    --danger: #b71c1c;
    --warn: #f5a623;
    --success: #2e7d32;
    --text: #f5ece7;
    --muted: #c39298;
    --card-r: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  button { outline: none; }
  button:focus-visible { outline: 2px solid var(--accent2); outline-offset: 2px; }
  html, body { max-width: 100vw; overflow-x: hidden; }
  body {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; color: var(--text);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    background:
      radial-gradient(60% 50% at 80% -10%, rgba(232,54,42,.28) 0%, rgba(232,54,42,0) 60%),
      var(--bg);
  }

  /* TOP BAR */
  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px; height: 52px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0; z-index: 100;
  }
  .logo { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
  .logo span { color: var(--accent); }
  .brand-logo { display:block; flex:none; filter:drop-shadow(0 0 5px rgba(255,31,61,.45)); }
  .badge-live { font-size: 10px; background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 99px; font-family: 'DM Mono', monospace; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .stat-pill { font-size: 11px; font-family: 'DM Mono', monospace; background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 4px 12px; color: var(--muted); }
  .stat-pill b { color: var(--text); }
  .btn-add { font-size: 12px; background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-weight: 500; }
  .btn-add:hover { background: #c92b20; }
  .btn-directions {
    font-size: 12px; font-weight: 700; color: #ffffff;
    background: var(--accent);
    box-shadow: 0 2px 8px rgba(232,54,42,.35);
    border: none; border-radius: 99px; padding: 7px 16px; cursor: pointer;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; white-space: nowrap;
  }
  .btn-directions:hover { background: #c92b20; }
  .btn-bookmarks {
    font-size:12px; font-weight:700; color:var(--text); background:var(--surface2);
    border:1px solid var(--border); border-radius:99px; padding:7px 13px; cursor:pointer;
    font-family:'Pretendard', 'Noto Sans KR', sans-serif; white-space:nowrap;
  }
  .btn-bookmarks:hover { border-color:var(--accent); color:#fff; }
  #btn-lang, #btn-save, #btn-rip, #btn-taste-top {
    display:inline-flex; align-items:center; justify-content:center; text-align:center;
    width:40px; min-width:40px; max-width:40px; height:40px; border-radius:50%;
    flex-shrink:0; flex-grow:0; padding:0; overflow:hidden; font-size:16px;
    transition: background .15s, transform .15s, box-shadow .15s;
  }
  #btn-lang:hover, #btn-rip:hover { background: var(--surface2); }
  #btn-save:hover { border-color:#a03446; box-shadow:0 4px 12px rgba(0,0,0,.35); }
  #btn-taste-top { box-shadow: 0 2px 10px rgba(232,54,42,.45); }
  #btn-taste-top:hover { filter:brightness(1.08); transform:translateY(-1px); }
  #btn-lang:active, #btn-save:active, #btn-rip:active, #btn-taste-top:active { transform: scale(.92); }
  .topbar-search-row {
    position:relative; padding: 10px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .topbar-search-row .search-box { margin-bottom: 0; max-width: 480px; }
  .search-results {
    display:none; position:absolute; top:48px; left:16px; width:min(480px, calc(100vw - 32px));
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    box-shadow:0 14px 32px rgba(0,0,0,.45); overflow:hidden; z-index:350;
  }
  .search-result {
    width:100%; display:flex; align-items:center; gap:10px; padding:11px 14px;
    border:none; border-bottom:1px solid var(--border); background:transparent; color:var(--text);
    text-align:left; cursor:pointer; font-family:'Pretendard', 'Noto Sans KR', sans-serif;
    transition: background .12s;
  }
  .search-result:last-child { border-bottom:none; }
  .search-result:hover { background:var(--surface2); }
  .search-result:active { background:rgba(232,54,42,.12); }
  .search-result-icon {
    width:28px; height:28px; border-radius:50%; flex:none;
    display:flex; align-items:center; justify-content:center; font-size:14px;
    background:var(--surface2);
  }
  .search-result-name { font-weight:600; font-size:13px; }
  .search-result-type { margin-left:auto; color:var(--muted); font-size:11px; flex:none; }
  .search-empty { padding:16px 14px; color:var(--muted); font-size:12px; text-align:center; }

  /* 지도 위에 항상 떠있는 카테고리 바 — 사이드바를 안 열어도 바로 필터링 가능하게 함 */
  .category-bar {
    display: flex; gap: 7px; overflow-x: auto; padding: 9px 16px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0; scrollbar-width: none;
  }
  .category-bar::-webkit-scrollbar { display: none; }
  .category-bar .chip { flex: none; white-space: nowrap; padding: 6px 13px; font-size: 12px; }

  /* LAYOUT */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    position: fixed; top: 52px; left: 0; bottom: 0; width: 300px; z-index: 300;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden;
    transform: translateX(-100%); transition: transform .25s ease;
    box-shadow: 4px 0 24px rgba(0,0,0,.3);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-close {
    position: absolute; top: 10px; right: 10px; z-index: 1;
    width: 26px; height: 26px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--surface2); color: var(--muted); font-size: 13px;
  }
  .menu-btn {
    background: none; border: none; color: var(--text);
    width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 16px;
    display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: background .15s, transform .15s;
  }
  .menu-btn:hover { background: var(--surface2); }
  .menu-btn:active { background: #5c1a24; transform: scale(.92); }
  @media (max-width: 640px) {
    .menu-btn { width: 40px; height: 40px; font-size: 15px; }
  }
  .drawer-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 250;
    opacity: 0; pointer-events: none; transition: opacity .25s ease;
  }
  .drawer-backdrop.show { opacity: 1; pointer-events: auto; }
  .sidebar-top { padding: 44px 14px 10px; border-bottom: 1px solid var(--border); }
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 10px; margin-bottom: 10px;
  }
  .search-box input { background: none; border: none; color: var(--text); font-size: 13px; width: 100%; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; outline: none; }
  .search-box input::placeholder { color: var(--muted); }
  .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-group { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
  .trivia-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--card-r);
    padding: 11px 13px; margin-bottom: 12px; cursor: pointer; transition: border-color .15s;
  }
  .trivia-card:hover { border-color: var(--accent); }
  .trivia-label { font-size: 10px; font-weight: 700; color: var(--accent); margin-bottom: 5px; letter-spacing: .02em; }
  .trivia-text { font-size: 12px; line-height: 1.55; color: var(--text); }
  .chip {
    font-size: 11px; padding: 4px 10px; border-radius: 99px; border: 1px solid var(--border);
    color: var(--muted); background: transparent; cursor: pointer; transition: all .15s;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
  }
  .chip:hover { border-color: var(--muted); }
  .chip:active { transform: scale(.95); }
  .chip.on {
    border: 2px solid var(--accent); color: #ffffff;
    background: rgba(232,54,42,.18);
    padding: 3px 9px; /* 테두리가 1px→2px로 두꺼워진 만큼 보정해서 전체 크기는 그대로 유지 */
  }

  /* '카테고리 보기' 토글 버튼 — 예전엔 작은 칩 하나였는데, 눌러서 아래 카테고리 목록을
     펼치고 접는 역할이 명확히 보이도록 폭을 넓히고 화살표 아이콘을 붙임 */
  .chip-category-toggle {
    width: 100%; text-align: left; display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; font-size: 12.5px; font-weight: 600;
  }
  .chip-caret { display: inline-block; transition: transform .2s ease; font-size: 10px; }

  .store-list { padding: 8px; }
  .store-list::-webkit-scrollbar { width: 4px; }
  .store-list::-webkit-scrollbar-track { background: transparent; }
  .store-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .store-item {
    padding: 11px 13px; border-radius: var(--card-r);
    border: 1px solid var(--border); border-left: 3px solid transparent; margin-bottom: 8px;
    cursor: pointer; background: var(--surface2);
    transition: transform .15s, box-shadow .15s, border-color .15s, background .15s;
  }
  .store-item:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,.25); }
  .store-item.active {
    border-color: var(--accent); border-left-color: var(--accent);
    background: rgba(232,54,42,.14); box-shadow: 0 4px 16px rgba(232,54,42,.2);
  }
  .store-item.closed-item { opacity: .5; }
  .item-top { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
  .item-name { font-size: 13.5px; font-weight: 600; flex: 1; letter-spacing: -.01em; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-open { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .dot-closed { background: var(--danger); }
  .dot-risk { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
  .dot-unverified { background: #93a8a2; }
  .dot-risk { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
  .item-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
  .score-row { display: flex; align-items: center; gap: 8px; }
  .score-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 2px; transition: width .4s; }
  .score-num { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); min-width: 24px; text-align: right; }

  /* MAP */
  .map-wrap { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }

  /* MAP OVERLAY BUTTONS */
  .map-controls {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    display: flex; flex-direction: column; gap: 6px;
  }
  .btn-home {
    position: absolute; bottom: 16px; right: 16px; z-index: 10;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 10px rgba(0,0,0,.3); transition: all .15s;
  }
  .btn-home:hover { border-color: var(--accent); color: var(--accent); }
  .btn-home:active { transform: scale(.92); }
  .map-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 11px; padding: 6px 12px;
    border-radius: 6px; cursor: pointer; font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    transition: all .15s; white-space: nowrap;
  }
  .map-btn:hover { background: var(--surface2); }
  .map-btn.on { border-color: var(--accent2); color: var(--accent2); }
  .btn-search-area {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 10;
    height: 38px; padding: 0 18px; border-radius: 99px; border: none;
    background: var(--text); color: var(--bg); font-size: 12.5px; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,.4);
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; white-space: nowrap;
    display: none; align-items: center; gap: 6px; transition: transform .15s, opacity .15s;
    animation: fadeSlideIn .2s ease;
  }
  @keyframes fadeSlideIn { from { opacity:0; transform:translateX(-50%) translateY(-6px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  .btn-search-area:hover { transform: translateX(-50%) scale(1.03); }
  .btn-search-area:active { transform: translateX(-50%) scale(.96); }
  @media (max-width: 640px) {
    .btn-search-area { height: 42px; font-size: 12px; top: 10px; }
  }

  /* 필터를 고르면 바로 리스트가 뜨지 않고, "몇 개 나왔는지"부터 알려주는 플로팅 버튼 */
  .btn-view-results {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%); z-index: 400;
    height: 48px; padding: 0 26px; border-radius: 99px; border: none;
    background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff;
    font-size: 14px; font-weight: 700; cursor: pointer;
    box-shadow: 0 6px 20px rgba(232,54,42,.45);
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; white-space: nowrap;
    display: none; align-items: center; gap: 8px; transition: transform .15s;
    animation: fadeSlideUp .2s ease;
  }
  .btn-view-results:hover { transform: translateX(-50%) scale(1.03); }
  .btn-view-results:active { transform: translateX(-50%) scale(.96); }
  @keyframes fadeSlideUp { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

  /* LEGEND */
  .legend {
    position: absolute; bottom: 20px; left: 12px; z-index: 10;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--card-r); padding: 10px 12px;
    font-size: 11px; color: var(--muted);
  }
  .legend-title { font-weight: 500; color: var(--text); margin-bottom: 8px; font-size: 12px; }
  .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* DETAIL PANEL */
  .detail {
    position: fixed; top: 52px; right: 0; bottom: 0; width: 320px; z-index: 300;
    background: var(--surface); border-left: 1px solid var(--border);
    overflow-y: auto; display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform .25s ease;
    box-shadow: -4px 0 24px rgba(0,0,0,.3);
  }
  .detail.open { transform: translateX(0); }
  .detail-close {
    position: absolute; top: 10px; right: 10px; z-index: 1;
    width: 26px; height: 26px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--surface2); color: var(--muted); font-size: 13px;
  }
  .detail::-webkit-scrollbar { width: 4px; }
  .detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .detail-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--muted); font-size: 13px; gap: 10px; padding: 20px; text-align: center;
  }
  .detail-empty .icon { font-size: 32px; opacity: .3; }

  .detail-header { padding: 16px; border-bottom: 1px solid var(--border); }
  .detail-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .detail-sub { font-size: 12px; color: var(--muted); display: flex; gap: 8px; align-items: center; }
  .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .badge-open { background: rgba(0,184,148,.2); color: var(--success); }
  .badge-closed { background: rgba(225,112,85,.2); color: var(--danger); }
  .badge-risk { background: rgba(253,203,110,.2); color: var(--warn); }
  .badge-unverified { background: rgba(136,136,160,.15); color: var(--muted); }

  .detail-body { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
  .section-title { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }

  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .metric { background: var(--surface2); border-radius: 8px; padding: 10px 12px; }
  .metric-val { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .metric-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .metric-val.good { color: var(--success); }
  .metric-val.bad { color: var(--danger); }
  .metric-val.warn { color: var(--warn); }

  .insight-card {
    background: var(--surface2); border-radius: 8px; padding: 12px;
    border-left: 3px solid var(--accent); font-size: 12px; color: var(--muted); line-height: 1.7;
  }
  .insight-card.danger { border-color: var(--danger); }
  .insight-card.warn { border-color: var(--warn); }
  .insight-label { font-size: 11px; font-weight: 500; color: var(--text); margin-bottom: 5px; }

  .compare-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .compare-row:last-child { border: none; }
  .compare-label { color: var(--muted); }
  .compare-val { font-family: 'DM Mono', monospace; font-size: 11px; }
  .up { color: var(--success); }
  .down { color: var(--danger); }

  .ai-btn {
    width: 100%; padding: 10px; border-radius: 8px;
    border: 1px solid var(--accent); background: rgba(232,54,42,.12);
    color: var(--accent); font-size: 12px; font-weight: 500;
    cursor: pointer; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; transition: all .15s;
  }
  .ai-btn:hover { background: rgba(232,54,42,.25); }

  /* LANDING */
  .landing-overlay {
    position: fixed; inset: 0; z-index: 500;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; text-align: center;
    background:
      radial-gradient(60% 50% at 80% -10%, rgba(232,54,42,.28) 0%, rgba(232,54,42,0) 60%),
      #2b070c; /* 지도 UI(var(--bg))와 동일한 크림슨 배경 */
  }
  .landing-card {
    position: relative; z-index: 1; padding: 0 24px; max-width: 560px;
  }
  .landing-card h1 {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; white-space: nowrap;
    font-size: clamp(30px, 8.5vw, 78px); font-weight: 900; letter-spacing: -0.02em;
    line-height: 1; color: #f5ece7; margin: 0 0 20px; text-transform: uppercase;
  }
  .landing-brand { display:flex; align-items:center; justify-content:center; gap:14px; margin:0 0 20px; }
  .landing-brand h1 { margin:0; }
  .landing-brand .brand-logo { width:64px; height:40px; }
  @media (max-width:480px) {
    .landing-brand { gap:9px; }
    .landing-brand .brand-logo { width:48px; height:30px; }
  }
  .landing-card p {
    font-size: 18px; color: rgba(245,236,231,.9); line-height: 1.6; margin: 0 auto 12px; max-width: 440px;
  }
  .landing-note { font-size: 13px; color: rgba(245,236,231,.55); margin: 4px 0 80px; }
  .landing-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .landing-btn {
    flex: 1 1 240px; max-width: 300px; padding: 13px 22px; border-radius: 99px;
    border: 1.5px solid rgba(245,236,231,.4);
    background: transparent; color: #f5ece7; font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; transition: all .15s;
  }
  .landing-btn:hover { border-color: #f5ece7; background: rgba(245,236,231,.08); }
  .landing-btn.primary { background: #ff3b3b; border-color: #ff3b3b; color: #fff; }
  .landing-btn.primary:hover { background: #ff5555; }
  .landing-beta {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 22px; font-size: 11px; color: rgba(245,236,231,.5);
  }
  .beta-badge {
    background: rgba(232,54,42,.18); color: #ff8a75; border: 1px solid rgba(232,54,42,.4);
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; letter-spacing: .04em;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 500; display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; width: 380px; max-height: 90vh; overflow-y: auto;
  }
  .modal h4 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }

  /* "가게 N곳 보기" 결과창 — 인스타그램 피드처럼 쭉 스크롤해서 보는 느낌으로 */
  #sort-modal .modal { display: flex; flex-direction: column; width: min(480px, 92vw); max-height: 82vh; padding: 20px 16px; }
  #sort-modal .feed-handle {
    display: none; width: 40px; height: 4px; border-radius: 99px;
    background: var(--border); margin: 0 auto 10px; flex: none;
  }
  @keyframes feedSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @media (max-width: 640px) {
    #sort-modal { align-items: flex-end; backdrop-filter: none; background: rgba(0,0,0,.55); }
    #sort-modal .modal {
      width: 100vw; max-width: 100vw; height: 88dvh; max-height: 88dvh;
      border-radius: 20px 20px 0 0; padding: 10px 14px calc(14px + env(safe-area-inset-bottom));
      animation: feedSlideUp .25s ease-out;
    }
    #sort-modal .feed-handle { display: block; }
    #sort-modal .store-item { padding: 14px 15px; margin-bottom: 10px; }
    #sort-modal .item-name { font-size: 15px; white-space: normal; }
    #sort-modal .item-meta { font-size: 12px; }
  }
  .form-group { margin-bottom: 12px; }
  .form-group label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 5px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 8px 10px; font-size: 13px;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; outline: none;
    transition: border-color .15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group select option { background: var(--surface2); }
  .form-group textarea { height: 80px; resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .btn-cancel {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 16px; cursor: pointer; font-size: 12px; font-weight: 600;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; transition: all .15s;
  }
  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }
  .btn-cancel:active { transform: scale(.96); }
  .btn-confirm {
    background: linear-gradient(135deg, var(--accent2), var(--accent)); border: none; color: #fff;
    border-radius: 10px; padding: 8px 16px; cursor: pointer; font-size: 12px; font-weight: 700;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; box-shadow: 0 2px 10px rgba(232,54,42,.4);
    transition: all .15s;
  }
  .btn-confirm:hover { filter: brightness(1.08); }
  .btn-confirm:active { transform: scale(.96); }

  /* IMPORT MODE */
  .import-mode-banner {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    z-index: 20; background: var(--accent); color: #fff;
    font-size: 12px; font-weight: 500; padding: 8px 18px;
    border-radius: 99px; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(232,54,42,.4);
    animation: bannerIn .2s ease;
    display: none;
  }
  @keyframes bannerIn { from{opacity:0;transform:translateX(-50%) translateY(-8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  .btn-import-on { border-color: var(--accent) !important; color: var(--accent) !important; background: rgba(232,54,42,.18) !important; }

  /* NEARBY PLACE PICKER */
  .place-picker {
    position: absolute; z-index: 30;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; width: 260px;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
    overflow: hidden;
    animation: pickerIn .15s ease;
  }
  @keyframes pickerIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
  .picker-header {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: space-between;
  }
  .picker-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; }
  .picker-list { max-height: 280px; overflow-y: auto; }
  .picker-list::-webkit-scrollbar { width: 4px; }
  .picker-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .picker-item {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background .1s;
  }
  .picker-item:last-child { border: none; }
  .picker-item:hover { background: var(--surface2); }
  .picker-item-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .picker-item-meta { font-size: 11px; color: var(--muted); }
  .picker-item-badge {
    display: inline-block; font-size: 10px; padding: 1px 6px;
    border-radius: 99px; margin-left: 6px; vertical-align: middle;
  }
  .picker-empty { padding: 20px; text-align: center; color: var(--muted); font-size: 12px; }
  .picker-loading { padding: 20px; text-align: center; color: var(--muted); font-size: 12px; }
  .picker-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .picker-tab {
    flex: 1; padding: 8px 0; font-size: 11px; font-weight: 500;
    text-align: center; cursor: pointer; color: var(--muted);
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all .15s; background: none; border-top: none; border-left: none; border-right: none;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
  }
  .picker-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .picker-search-box {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .picker-search-box input {
    flex: 1; background: none; border: none; color: var(--text);
    font-size: 12px; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; outline: none;
  }
  .picker-search-box input::placeholder { color: var(--muted); }
  .picker-search-btn {
    background: var(--accent); border: none; color: #fff;
    font-size: 11px; padding: 4px 10px; border-radius: 4px;
    cursor: pointer; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; white-space: nowrap;
  }

  /* KAKAO MAP CUSTOM MARKER */
  .custom-marker {
    position: relative; cursor: pointer;
  }
  .marker-circle {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; border: 2px solid rgba(255,255,255,.3);
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
    transition: transform .15s;
  }
  .marker-label {
    position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
    white-space: nowrap; font-size: 10px; font-weight: 500;
    background: #2a0a0a; color: #ffffff;
    padding: 2px 6px; border-radius: 4px;
  }

  /* LOADING */
  .loading {
    position: absolute; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; gap: 12px;
  }
  .loading-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
  .loading-dots { display: flex; gap: 6px; }
  .loading-dot:nth-child(2) { animation-delay: .2s; }
  .loading-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }
  .loading p { font-size: 13px; color: var(--muted); }

  /* SEARCH RESULT INFO WINDOW */
  .kakao-infobox {
    background: #ffffff; border: 1px solid #dde8ec; border-radius: 10px;
    padding: 10px 14px; min-width: 160px; font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    box-shadow: 0 6px 20px rgba(20,60,50,.14);
  }
  .kakao-infobox .ib-name { font-size: 13px; font-weight: 600; color: #3d1712; margin-bottom: 4px; }
  .kakao-infobox .ib-addr { font-size: 11px; color: #5c756d; }
  /* ── 모바일 대응 ── */
  @media (max-width: 640px) {
    .topbar { padding: 0 10px; gap: 8px; }
    .logo { font-size: 13px; }
    .brand-logo { width: 26px !important; height: 17px !important; }
    .topbar-right { gap: 6px; }
    .btn-bookmarks, .btn-directions, .btn-add {
      font-size: 11px; padding: 6px 9px;
    }
    #btn-lang, #btn-save, #btn-rip, #btn-taste-top {
      width: 40px; min-width: 40px; max-width: 40px; height: 40px; font-size: 15px;
    }

    .topbar-search-row { padding: 8px 10px; }
    .category-bar { padding: 7px 10px; gap: 6px; }

    .sidebar, .detail { width: 100vw; max-width: 100vw; }
    .sidebar-top { padding: 40px 12px 10px; }
    .filter-chips { gap: 5px; }
    .filter-chips .chip { font-size: 11px; padding: 7px 11px; }
    .filter-group { margin-top: 11px; padding-top: 9px; }
    .trivia-card { padding: 9px 11px; margin-bottom: 9px; }
    .trivia-text { font-size: 11.5px; }

    .map-controls { max-width: calc(100vw - 24px); }
    .map-btn { white-space: normal; font-size: 10px; line-height: 1.4; text-align: left; }

    .modal { width: calc(100vw - 32px); padding: 18px; }

    .landing-card h1 { font-size: clamp(26px, 11vw, 52px); }
    .landing-card p { font-size: 15px; }
    .landing-btn { flex: 1 1 100%; } /* 좁은 화면에선 버튼을 위아래로 쌓음 */

    .detail-body, .store-item { font-size: 13px; }
    .store-item { padding: 9px 11px; }
    .item-name { font-size: 12.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  }

  /* 아주 좁은 화면(구형 소형 스마트폰) 추가 여백 축소 */
  @media (max-width: 380px) {
    .topbar { gap: 5px; padding: 0 8px; }
    .logo { font-size: 12px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="menu-btn" onclick="toggleSidebar()" title="메뉴">☰</button>
  <div class="logo" style="letter-spacing:0.5px;display:flex;align-items:center;gap:8px">

      <defs><linearGradient id="header-logo-red" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ff183c"/><stop offset=".55" stop-color="#e60025"/><stop offset="1" stop-color="#ff3654"/></linearGradient></defs>
      <circle cx="55" cy="62" r="31" fill="none" stroke="url(#header-logo-red)" stroke-width="16"/><circle cx="135" cy="62" r="31" fill="none" stroke="url(#header-logo-red)" stroke-width="16"/>
      <path d="M87 54h16v16H87zM15 20h80v17H15zM47 0h16v37H47z" fill="url(#header-logo-red)"/>
    </svg>
    Hongdae Map

  <div class="topbar-right">

</div>
<div class="topbar-search-row">
  <div class="search-box">
    <svg width="14" height="14" fill="none" stroke="#93a8a2" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="업소명 검색..." oninput="filterList()">
  </div>
  <div class="search-results" id="search-results"></div>
</div>

<div class="category-bar" id="category-bar">
  <button class="chip on" id="catbar-all" onclick="selectCategoryBar('all', this)">전체</button>

<div class="drawer-backdrop" id="drawer-backdrop" onclick="closeSidebar()"></div>

<div class="layout">

  <!-- SIDEBAR -->

      <div class="trivia-card" id="trivia-card" onclick="nextTrivia()">

        </button>

          <button class="chip" data-filter-group="cuisine" data-filter-key="cuisine:한식" onclick="toggleCuisineFilter('한식',this)">한식</button>

          <button class="chip" data-filter-group="cuisine" data-filter-key="cuisine:일식" onclick="toggleCuisineFilter('일식',this)">일식</button>
          <button class="chip" data-filter-group="cuisine" data-filter-key="cuisine:양식" onclick="toggleCuisineFilter('양식',this)">양식</button>

          <button class="chip" onclick="toggleDetailFilter('cafeSub:디저트',this)">🍰 디저트·베이커리</button>

    <button id="sort-trigger-btn" onclick="openSortModal()" style="display:none !important;">🔀 정렬</button>

(function setupFeedSwipeToClose() {
  const modal = document.querySelector('#sort-modal .modal');
  const handle = document.querySelector('#sort-modal .feed-handle');
  if (!modal || !handle) return;
  let startY = null;
  handle.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    modal.style.transition = 'none';
  }, { passive: true });
  handle.addEventListener('touchmove', e => {
    if (startY === null) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0) modal.style.transform = `translateY(${dy}px)`;
  }, { passive: true });
  handle.addEventListener('touchend', e => {
    modal.style.transition = '';
    const dy = e.changedTouches[0].clientY - startY;
    modal.style.transform = '';
    startY = null;
    if (dy > 100) closeSortModal();
  });
})();

function exportChanges() {
  if (sessionAdditions.length === 0) {
    alert('아직 추가한 매장이 없어요.\n지도에서 불러오기로 매장을 먼저 추가해주세요.');
    return;
  }
  const blob = new Blob([JSON.stringify(sessionAdditions, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  const now = new Date();
  const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
  a.href = URL.createObjectURL(blob);
  a.download = `new_stores_${stamp}.json`;
  a.click();
  showToast(`💾 매장 ${sessionAdditions.length}곳을 파일로 내보냈어요`);
}

  if (s.category && s.category.includes('카페')) return { icon:'☕', color:'#a9744f', label:'카페', labelEn:'Cafe' };
  if (s.type === 'bar' || (s.category && /주점|맥주|호프/.test(s.category))) return { icon:'🍺', color:'#f5a623', label:'술집', labelEn:'Bar' };
  if (s.type === 'retail') return { icon:'📌', color:'#93a8a2', label:'기타', labelEn:'Other' };
  return { icon:'🍜', color:'#e8362a', label:'맛집', labelEn:'Eat' };
}

function cuisineLabel(s) {
  const category = s.category || '';
  if (/중식|중국|마라탕|훠궈/.test(category)) return '중식';
  if (/일식|초밥|회|라멘|소바|야키토리/.test(category)) return '일식';
  if (/양식|경양식|피자|버거|파스타/.test(category)) return '양식';
  if (/베트남|태국|동남아/.test(category)) return '아시아식';
  if (/카페|빵|도넛|베이커리/.test(category)) return '카페·디저트';
  if (/주점|맥주|호프/.test(category) || s.type === 'bar') return '주점';
  return '한식';
}

// 카페 세부 분류 — 실제 데이터(카테고리/시그니처 메뉴) 키워드 기반, 지어내지 않음

// 주점 세부 분류
function barSubType(s) {

// 없으면 장르(cuisineLabel) 기준 대표 이모티콘으로 대체한다. 지어내지 않고 규칙 기반으로만 매칭.

  }).join(', ');

function objectiveTasteTags(s) {
  const tags = [`#${s.dong || '홍대'}`];
  if (s.type === 'restaurant') tags.push(`#${cuisineLabel(s)}`);

  (s.certifications || []).forEach(tag => tags.push(`#${tag}`));
  if (Number.isFinite(s.operatingMonths)) {
    if (s.operatingMonths >= 360) tags.push('#30년 노포');
    else if (s.operatingMonths >= 120) tags.push('#10년 이상');
  }

  const reviewTotal = (Number.isFinite(s.kakaoReviews) ? s.kakaoReviews : 0)
    + (Number.isFinite(s.naverReviews) ? s.naverReviews : 0);
  if (reviewTotal >= 1000) tags.push('#리뷰 1,000+');
  else if (reviewTotal >= 300) tags.push('#리뷰 300+');

  const serviceTags = {
    reservation:'예약 가능', takeout:'포장 가능', delivery:'배달 가능', parking:'주차 가능',
    wheelchair:'휠체어 접근', petFriendly:'반려동물 동반', lateNight:'심야 영업',
    dailyOpen:'매일 영업', noBreak:'브레이크타임 없음'
  };
  (s.services || []).forEach(key => { if (serviceTags[key]) tags.push(`#${serviceTags[key]}`); });
  return tags;
}

// 홍익대 정문 기준 실거리(m) — 실제 좌표로 계산, 임의값 아님
const HONGIK = { lat: 37.5511, lng: 126.9256 };
const HONGDAE_ENTRANCE = { name:'홍대입구역', lat:37.556670, lng:126.923610 };
function distToCampus(s) {
  const R = 6371000, toRad = d => d * Math.PI / 180;
  const dLat = toRad(HONGIK.lat - s.lat), dLng = toRad(HONGIK.lng - s.lng);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(s.lat))*Math.cos(toRad(HONGIK.lat))*Math.sin(dLng/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

  all[storeId].push({ text, date: new Date().toLocaleDateString('ko-KR') });
  localStorage.setItem('storeComments', JSON.stringify(all));
  selectStore(storeId); // 다시 그려서 새 코멘트 반영
}

const TASTE_TAGS = ['매운맛','혼밥','데이트','인스타감성','조용한','시끌벅적','가성비','술안주','디저트','로컬단골','홍대병','노포'];
let userTastes = JSON.parse(localStorage.getItem('userTastes') || '[]');
applyLang(); // 페이지 로드 즉시 적용 (카카오맵 로드를 기다리지 않아도 되게)


function openTasteModal() {
  const wrap = document.getElementById('taste-tags');
  wrap.innerHTML = TASTE_TAGS.map(t => {
    const isHongdaeByeong = t === '홍대병';
    const label = isHongdaeByeong ? '🦋 홍대병' : t;
    const specialStyle = isHongdaeByeong ? 'border-color:#8e44ad;' : '';
    return `<button class="chip ${userTastes.includes(t)?'on':''}" style="${specialStyle}" onclick="toggleTaste('${t}', this)">${label}</button>`;
  }).join('');
  document.getElementById('taste-modal').style.display = 'flex';
}
function closeTasteModal() { document.getElementById('taste-modal').style.display = 'none'; }

function toggleTaste(tag, btn) {
  if (userTastes.includes(tag)) userTastes = userTastes.filter(t => t !== tag);
  else userTastes.push(tag);
  btn.classList.toggle('on');
}

function applyTaste() {
  if (userTastes.length === 0) { alert('취향을 2개 이상 골라주세요.'); return; }
  localStorage.setItem('userTastes', JSON.stringify(userTastes));
  closeTasteModal();
  showTasteView();
}

// store와 사용자 취향이 겹치는 개수 (tags 없는 매장은 0)
function matchScore(s) {
  if (!s.tags) return 0;
  return s.tags.filter(t => userTastes.includes(t)).length;
}
// 일치율(%) — 사용자가 고른 취향 중 이 매장이 몇 %를 만족하는지
function matchPercent(s) {
  if (!s.tags || userTastes.length === 0) return 0;
  return Math.round((matchScore(s) / userTastes.length) * 100);
}
// 실제로 겹친 태그만 뽑아서 "왜 매칭됐는지" 이유로 보여줌 (번역 적용)
function matchedTagNames(s) {
  if (!s.tags) return [];
  return s.tags.filter(t => userTastes.includes(t)).map(t => localizeTag(`#${t}`));
}

// 취향 추천 화면으로 전환 (랜딩페이지 버튼 / 취향모달 둘 다 여기로 모임)

  currentFilter = 'taste';

}

// ── 카카오 실존 검증 엔진 ──────────────────────────────
// 배치 단위로 업체명+좌표를 카카오 Places에 검색, 실존 확인 + 실제 데이터 채움

function verifyStoresWithKakao() {
  // unverified 상태인 것만
  verifyQueue = stores.filter(s => s.status === 'unverified').map(s => s.id);
  updateVerifyBanner();
  processVerifyQueue();
}

function updateVerifyBanner() {
  const total = stores.filter(s => s.status === 'unverified').length + verifiedCount + removedCount;
  const done = verifiedCount + removedCount;
  let el = document.getElementById('verify-banner');
  if (!el) {
    el = document.createElement('div');
    el.id = 'verify-banner';
    el.style.cssText = `position:fixed;bottom:20px;right:20px;z-index:400;
      background:#ffffff;border:1px solid #dde8ec;border-radius:10px;
      padding:10px 16px;font-size:11px;color:#5c756d;
      box-shadow:0 4px 16px rgba(20,60,50,.18);min-width:200px;`;
    document.body.appendChild(el);
  }
  if (verifyQueue.length === 0 && done > 0) {
    el.innerHTML = `✅ 검증 완료 — 실존 <b style="color:#e8362a">${verifiedCount}곳</b> 확인, <b style="color:#e8362a">${removedCount}곳</b> 제외`;
    setTimeout(() => el.style.opacity = '0', 4000);
    setTimeout(() => el.remove(), 4500);
    return;
  }
  el.innerHTML = `🔍 카카오 실존 검증 중... <b style="color:#3d1712">${done}/${total}</b>`;
}

function processVerifyQueue() {
  if (verifyRunning || verifyQueue.length === 0) return;
  verifyRunning = true;

  const id = verifyQueue.shift();
  const s = stores.find(x => x.id === id);
  if (!s) { verifyRunning = false; processVerifyQueue(); return; }

  const ps = new kakao.maps.services.Places();
  const latlng = new kakao.maps.LatLng(s.lat, s.lng);

  // 업체명으로 반경 200m 내 검색
  ps.keywordSearch(s.name, (data, status) => {
    if (status === kakao.maps.services.Status.OK && data.length > 0) {
      // 가장 가까운 결과 선택
      const best = data[0];
      const CAT_TYPE = { FD6:'restaurant', CE7:'cafe', BK9:'bar', MT1:'retail' };

      // 실제 카카오 데이터로 업데이트
      s.kakaoId = best.id;
      s.kakaoUrl = best.place_url;
      s.lat = parseFloat(best.y);
      s.lng = parseFloat(best.x);
      s.address = best.road_address_name || best.address_name;
      if (CAT_TYPE[best.category_group_code]) s.type = CAT_TYPE[best.category_group_code];

      // 평점·리뷰는 카카오 API에서 직접 제공 안 되므로 운영 기간만 추정, 나머지 기본값
      s.rating = s.rating || 3.8;
      s.reviews = s.reviews || 0;
      s.months = s.months || 18;
      s.rent = s.rent || 280;
      const sc = Math.round((s.rating/5)*30 + Math.min(s.reviews/500,1)*20 + Math.min(s.months/60,1)*25 + Math.max(0,(500-s.rent)/500)*15 + 10);
      s.score = Math.min(100, sc);
      s.status = 'open';

      verifiedCount++;
    } else {
      // 카카오에서 못 찾으면 목록에서 제거
      stores = stores.filter(x => x.id !== id);
      removedCount++;
    }

    verifiedCount % 10 === 0 && renderAll();  // 10개마다 화면 갱신
    updateStats();
    updateVerifyBanner();

    verifyRunning = false;
    // 카카오 API 쿼터 보호: 100ms 간격
    setTimeout(processVerifyQueue, 100);
  }, { location: latlng, radius: 200, size: 1 });
}

function renderAll() {

function getScoreColor(score) {
  if (score >= 75) return '#00b894';
  if (score >= 50) return '#fdcb6e';
  return '#e17055';
}

// 매장 이름표 오버레이 하나를 만들어주는 헬퍼 (선택됨/호버 공용)
function makeLabelOverlay(s, pos, opts) {
  return new kakao.maps.CustomOverlay({
    position: pos, yAnchor: 2.4, zIndex: opts.zIndex,
    content: `<div style="white-space:nowrap;font-size:9px;font-weight:600;
      background:#2a0a0a;color:#ffffff;padding:2px 5px;border-radius:3px;
      font-family:sans-serif;pointer-events:none;${opts.outline?'outline:1px solid #e8362a':''}">
      ${s.name}
    </div>`
  });
}

// 마우스를 올렸을 때만 보이는 이름표 — 선택된 매장 라벨과는 별개
function showHoverLabel(s, pos) {
  if (selectedId === s.id) return; // 이미 선택 라벨이 떠 있음
  if (hoverOverlay) hoverOverlay.setMap(null);
  hoverOverlay = makeLabelOverlay(s, pos, { zIndex: 15, outline: false });
  hoverOverlay.setMap(map);
}
function hideHoverLabel(id) {
  if (selectedId === id) return;
  if (hoverOverlay) { hoverOverlay.setMap(null); hoverOverlay = null; }
}

function renderMarkers() {
  // 클러스터러는 최초 1회만 생성해서 재사용 (매번 새로 만들면 깜빡임 생김)
  if (!clusterer) {
    clusterer = new kakao.maps.MarkerClusterer({
      map,
      averageCenter: true,
      minLevel: 3,       // 이 레벨보다 축소하면 클러스터로 뭉침 (기존 4 → 3, 더 적극적으로 뭉치게)
      minClusterSize: 3, // 3개 미만이면 굳이 안 뭉침
      styles: [{
        width: '38px', height: '38px', lineHeight: '38px',
        borderRadius: '50%', textAlign: 'center', fontWeight: '600',
        fontSize: '13px', color: '#fff',
        background: 'rgba(34,66,58,.88)',
        border: '2px solid rgba(255,255,255,.6)'
      }]
    });
  }
  clusterer.clear();
  storeMarkers.forEach(m => kakao.maps.event.removeListener(m));
  storeMarkers = [];
  if (overlay) { overlay.setMap(null); overlay = null; }
  if (hoverOverlay) { hoverOverlay.setMap(null); hoverOverlay = null; }

  stores.forEach(s => {
    const pos = new kakao.maps.LatLng(s.lat, s.lng);

    // 카테고리(맛집/카페/술집) 기준 색상 — 카드 디자인과 통일
    const info = catInfo(s);
    const color = '#ff2d78'; // 핑크/레드 계열로 통일
    const emoji = info.icon;

    const isSelected = selectedId === s.id;
    const isUnverified = s.status === 'unverified';
    // 카카오 기본 업체 아이콘/라벨과 겹칠 확률과 면적을 줄이기 위해, 이모지+큰 원 대신 작은 점(dot)으로 단순화
    const size = isSelected ? 16 : 10;
    const strokeW = isSelected ? 2.5 : 1.5;
    const strokeColor = '#ffffff';
    const fillOpacity = isUnverified ? 0.7 : 1; // 미검증이어도 카테고리색은 유지하되 살짝 옅게

    // 카카오 기본 라벨과 안 겹치게, 아이콘을 이미지 마커로 그려서 클러스터러가 관리하게 함
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${size/2 - strokeW}" fill="${color}"
        fill-opacity="${fillOpacity}" stroke="${strokeColor}" stroke-width="${strokeW}"/>
    </svg>`;
    const markerImage = new kakao.maps.MarkerImage(
      'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
      new kakao.maps.Size(size, size)
    );

    const marker = new kakao.maps.Marker({
      position: pos, image: markerImage, title: s.name, zIndex: isSelected ? 10 : 1
    });

    kakao.maps.event.addListener(marker, 'click', () => selectStore(s.id));
    kakao.maps.event.addListener(marker, 'mouseover', () => showHoverLabel(s, pos));
    kakao.maps.event.addListener(marker, 'mouseout', () => hideHoverLabel(s.id));

    storeMarkers.push(marker);

    if (isSelected) {
      overlay = makeLabelOverlay(s, pos, { zIndex: 20, outline: true });
      overlay.setMap(map);
    }
  });

  if (showMarkers) clusterer.addMarkers(storeMarkers);
}

function renderList() {
  try {
    renderListImpl();
  } catch (e) {
    console.error('renderList 오류:', e);
    if (typeof showToast === 'function') showToast('목록을 불러오는 중 오류가 발생했어요 (콘솔 확인)');
  }
}
function renderListImpl() {
  const list = document.getElementById('store-list');
  const dongFilters = ['서교동','연남동','합정동','상수동'];
  const isDongFilter = dongFilters.includes(currentFilter);
  const isTasteMode = currentFilter === 'taste';
  const isBookmarkMode = currentFilter === 'bookmarks';
  const isGoneMode = currentFilter === 'gone';
  const isHallOfFameMode = currentFilter === 'hallOfFame';
  const isMichelinMode = currentFilter === 'michelin';
  const isCenturyMode = currentFilter === 'centuryStore';
  const isRepresentativeMode = currentFilter === 'representative'; // 태그가 붙은 프로토타입 대표 맛집 ~40곳
  const isCuisineMode = currentFilter.startsWith('cuisine:');
  const isCafeSubMode = currentFilter.startsWith('cafeSub:');
  const isBarSubMode = currentFilter.startsWith('barSub:');
  const isDetailFiltersMode = currentFilter === 'detailFilters';
  const isCardMode = true; // 이제 모든 필터(전체 포함)가 태그 중심 카드 레이아웃을 씀 — 실제 평점/점수 없는 unverified 매장뿐이라 예전 점수바 레이아웃이 의미가 없었음

  let filtered = stores.filter(s => {
    // '이 지역에서 검색'으로 지도 화면을 좁혀뒀다면, 그 화면 밖 매장은 어떤 모드든 제외
    if (boundsFilter && !boundsFilter.contain(new kakao.maps.LatLng(s.lat, s.lng))) return false;

    if (isTasteMode) return s.tags && matchScore(s) > 0; // 취향 모드는 unverified 여부와 무관하게 태그 매칭만 봄
    if (isGoneMode) return s.status === 'closed'; // 폐업으로 확인된 곳만 (지어내지 않음)
    if (isHallOfFameMode) return (s.certifications || []).includes('홍대생 명예학식');
    if (isMichelinMode) return (s.certifications || []).some(c => c.includes('미쉐린'));
    if (isCenturyMode) return isCenturyStore(s);
    if (isRepresentativeMode) return s.tags && s.tags.length > 0; // 취향 태그가 붙어있는 프로토타입 40곳
    if (isDetailFiltersMode) return matchesActiveDetailFilters(s); // 복수 선택 — 같은 종류끼리는 OR, 다른 종류끼리는 AND
    if (isCuisineMode) {
      const want = currentFilter.split(':')[1];
      const label = cuisineLabel(s);
      return s.type === 'restaurant' && (want === '글로벌' ? label === '아시아식' : label === want);
    }
    if (isCafeSubMode) return s.type === 'cafe' && cafeSubType(s) === currentFilter.split(':')[1];
    if (isBarSubMode) return s.type === 'bar' && barSubType(s) === currentFilter.split(':')[1];
    // 예전엔 unverified 매장을 '전체' 필터 말고는 다 숨겼는데, 지금 매장이 전부 unverified 상태라
    // 음식점/카페/주점/동네 필터를 눌러도 아무것도 안 뜨는 버그였음. 그 예외 규칙을 제거함.
    const matchFilter = currentFilter === 'all'
      || (isBookmarkMode && bookmarks[s.id])
      || s.type === currentFilter
      || (currentFilter === 'closed' && s.status === 'closed')
      || (isDongFilter && s.dong === currentFilter);
    return matchFilter && s.name.includes(searchText);
  });

  // 가나다순(2순위 기준) — "많이 찾는 순"(인기순)은 실사용 데이터가 없어 아직 구현하지 않음
  if (isCuisineMode || isCafeSubMode || isBarSubMode || isDetailFiltersMode || currentFilter === 'club' || currentFilter === 'animeshop' || currentFilter === 'entertainment') {
    filtered.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
  }

  if (isTasteMode) filtered.sort((a, b) => matchScore(b) - matchScore(a));
  const showSortBar = !isTasteMode; // 취향 매칭 모드만 자체 정렬(일치도순)을 쓰고, 나머지 필터는 전부 공통 정렬 버튼을 씀
  if (showSortBar) {
    if (listSort === 'name') filtered.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
    else if (listSort === 'category') {
      const order = ['한식','중식','양식','일식','아시아식','카페·디저트','주점'];
      filtered.sort((a, b) => {
        const diff = order.indexOf(cuisineLabel(a)) - order.indexOf(cuisineLabel(b));
        return diff !== 0 ? diff : a.name.localeCompare(b.name, 'ko');
      });
    }
    else if (listSort === 'distance') filtered.sort((a, b) => distToCampus(a) - distToCampus(b));
  }

  const emptyMsg = isTasteMode ? '취향에 맞는 매장이 아직 없어요 (홍대 대표 맛집 40곳 중에서만 찾아요)'
    : isBookmarkMode ? '저장한 장소가 아직 없어요'
    : isGoneMode ? '아직 등록된 "사라진 가게"가 없어요.'
    : isHallOfFameMode ? '아직 등록된 명예학식이 없어요.'
    : isMichelinMode ? '아직 등록된 미쉐린 가이드 매장이 없어요.'
    : isCenturyMode ? '아직 백년가게 인증이 확인된 매장이 없어요.'
    : (currentFilter === 'club' || currentFilter === 'animeshop' || currentFilter === 'entertainment')
      ? '이 카테고리는 준비 중이에요. 곧 채워질 예정이에요.'
    : isRepresentativeMode ? '아직 등록된 대표 맛집이 없어요.'
    : '검색 결과 없음';

  // "사라진 가게" 모드에서는 몇 개가 등록돼 있든 상관없이 계속 추가할 수 있게,
  // 리스트 맨 위에 항상 등록 버튼을 띄워둔다 (예전엔 리스트가 비어있을 때만 보여서 1개 등록하면 사라지는 버그가 있었음).
  const goneAddButtonHtml = isGoneMode
    ? `<button class="map-btn" style="width:100%;margin-bottom:10px" onclick="openModal('closed')">+ 사라진 가게 제보하기</button>`
    : '';

  // 정렬 트리거 버튼/리스트는 왼쪽 사이드바에서 더 이상 노출하지 않음 — 결과는 항상 중앙 모달에서만 보여줌
  const sortLabelMap = { default:'기본', category:'카테고리순', name:'가나다순', distance:'거리순' };

  list.innerHTML = (isGoneMode ? goneAddButtonHtml : '') + (filtered.length === 0
    ? `<div style="text-align:center;color:var(--muted);font-size:12px;padding:20px">${emptyMsg}</div>`
    : filtered.map(s => {
      const isUnverified = s.status === 'unverified';
      const scoreColor = isUnverified ? '#93a8a2' : getScoreColor(s.score);
      const monthsTxt = s.months != null ? `${s.months}개월` : '';
      const reviewsTxt = s.reviews != null ? `리뷰 ${s.reviews}` : '';
      const scorePct = isUnverified ? 0 : s.score;
      const match = isTasteMode ? matchScore(s) : 0;
      const matchPct = isTasteMode ? matchPercent(s) : 0;
      const matchReasons = isTasteMode ? matchedTagNames(s) : [];
      const matchBadge = isTasteMode
        ? `<span style="font-size:11px;color:#e8362a;font-weight:800">🎯 ${matchPct}% 일치</span>`
        : '';

      if (isCardMode) {
        // 취향태그 카드와 같은 톤으로 통일된 큐레이션 카드 레이아웃
        const info = catInfo(s);
        const cardTags = ((isTasteMode || isRepresentativeMode) ? (s.tags || []).map(t => `#${t}`) : objectiveTasteTags(s)).map(localizeTag);
        const badgeHtml = isTasteMode ? matchBadge
          : isGoneMode ? '<span style="font-size:10px;color:#93a8a2;font-weight:600">🪦 R.I.P</span>'
          : isHallOfFameMode ? '<span style="font-size:10px;color:#a9744f;font-weight:700">🏅 명예학식</span>'
          : isMichelinMode ? '<span style="font-size:10px;color:#c0392b;font-weight:700">🍽️ 미쉐린 가이드</span>'
          : isRepresentativeMode ? '<span style="font-size:10px;color:#a9744f;font-weight:700">⭐ 대표 맛집</span>' : '';
        const memoryHtml = (isGoneMode && s.memory)
          ? `<div style="font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5;font-style:italic">“${s.memory}”</div>` : '';
        return `
        <div class="store-item ${selectedId===s.id?'active':''}" onclick="selectStore(${s.id})"
             style="${isGoneMode?'opacity:.75;':''}">
          <div class="item-top">
            <span style="width:26px;height:26px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex:none">${menuEmoji(s)}</span>
            <div class="item-name">${s.name}</div>
            <div style="font-size:10px;color:var(--muted)">${info.label}</div>
          </div>
          <div class="item-meta">${badgeHtml}</div>
          <div style="font-size:10px;color:var(--text);opacity:.85">${cardTags.join(' · ')}</div>
          ${isTasteMode && matchReasons.length ? `<div style="font-size:10px;color:#ff8a75;margin-top:3px">✨ ${matchReasons.join(', ')} 일치</div>` : ''}
          ${memoryHtml}
        </div>`;
      }

      return `
      <div class="store-item ${s.status==='closed'?'closed-item':''} ${selectedId===s.id?'active':''}"
           onclick="selectStore(${s.id})" style="${isUnverified?'opacity:.4;':''}">
        <div class="item-top">
          <div class="status-dot dot-${s.status}"></div>
          <div class="item-name">${s.name}</div>
          <div style="font-size:10px;color:var(--muted)">${TYPES[s.type]||s.type}</div>
        </div>
        <div class="item-meta">
          ${monthsTxt?`<span>${monthsTxt}</span>`:''}
          ${reviewsTxt?`<span>${reviewsTxt}</span>`:''}
        </div>
        <div class="score-row">
          <div class="score-bar"><div class="score-fill" style="width:${scorePct}%;background:${scoreColor}"></div></div>
          <div class="score-num" style="color:${scoreColor}">${isUnverified?'…':s.score}</div>
        </div>
      </div>`;
    }).join(''));

  lastFilteredCount = filtered.length;
  updateResultsBar();
}

// 필터를 고를 때마다 곧장 리스트를 열지 않고, 몇 개가 나왔는지부터 하단에 알려줌.
// (네이버지도의 "결과보기 00건" 버튼과 같은 역할 — 사용자가 직접 눌러야 전체 리스트로 넘어감)
function updateResultsBar() {
  const bar = document.getElementById('btn-view-results');
  const countEl = document.getElementById('results-count');
  if (!bar) return;
  if (lastFilteredCount > 0) {
    if (countEl) countEl.textContent = lastFilteredCount;
    bar.style.display = 'flex';
  } else {
    bar.style.display = 'none';
  }
}

function updateStats() {
  // 상단바 통계 UI(영업중/폐점/평균생존)는 제거했으므로 더 이상 DOM에 쓰지 않음.
  // 필요해지면 여기서 다시 계산해서 원하는 위치에 표시하면 됨.
}

// ── SELECT STORE ──────────────────────────────────────
function selectStore(id) {
  selectedId = id;
  const s = stores.find(x=>x.id===id);
  if (!s) return;
  renderMarkers();
  renderList();
  openDetail();

  if (map) map.panTo(new kakao.maps.LatLng(s.lat, s.lng));

  document.getElementById('detail-empty').style.display = 'none';
  const dc = document.getElementById('detail-content');
  dc.style.display = 'block';

  // unverified: 검증 대기 패널 — Claude Design 시안(카드 A 민트클린 / 카드 B 레드로드) 반영
  if (s.status === 'unverified') {
    // 카카오/네이버 지도 API는 실시간 영업 여부·영업시간 필드를 제공하지 않으므로,
    // 자동 판정 대신 사람이 링크를 눌러 직접 확인 후 상태를 반영하는 방식으로 처리한다.
    const kakaoUrl = s.kakaoUrl || `https://map.kakao.com/?q=${encodeURIComponent(s.name + ' ' + (s.address||s.dong||''))}`;
    const naverUrl = s.naverUrl || `https://map.naver.com/p/search/${encodeURIComponent(s.name + ' ' + (s.address||s.dong||''))}`;
    const info = catInfo(s);
    const dist = distToCampus(s);
    const walk = Math.max(1, Math.round(dist / 70)); // 도보 약 70m/분 기준 추정치
    const tags = objectiveTasteTags(s).map(localizeTag);
    // 카드 B는 큐레이터 스토리만 보여주고, 공식 인증은 취향 태그(A)에서만 표시한다.
    const storyTags = s.storyTags || ['재학생 추천', `${s.dong} 골목 스토리`];
    const signatureMenus = (Array.isArray(s.signatureMenu)
      ? s.signatureMenu
      : (s.signatureMenu || '').split(',').map(menu => menu.trim()).filter(Boolean)
    ).map(localizeMenuText);
    const signatureMenuSection = `
      <div style="margin-top:10px;padding:11px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px">
        <div style="font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.06em;margin-bottom:7px">SIGNATURE MENU</div>
        ${signatureMenus.length
          ? `<div style="display:flex;flex-wrap:wrap;gap:6px">${signatureMenus.map(menu => `<span style="background:#fdf0e4;color:#8a5a3a;font-size:11px;font-weight:700;padding:4px 8px;border-radius:999px">${menu}</span>`).join('')}</div>`
          : '<div style="font-size:11px;color:var(--muted)">대표 메뉴 정보가 아직 없어요.</div>'}
      </div>`;
    const bm = !!bookmarks[s.id];

    const styleToggle = `
      <div style="display:flex;gap:4px;background:#fff;border-radius:999px;padding:4px;box-shadow:0 2px 10px rgba(20,60,50,.1);width:fit-content;margin-bottom:10px">
        <button onclick="setCardStyle('A')" style="border:none;cursor:pointer;padding:6px 12px;border-radius:999px;font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif;background:${cardStyle==='A'?'#e8362a':'transparent'};color:${cardStyle==='A'?'#fff':'#5c756d'}">취향 태그</button>
        <button onclick="setCardStyle('B')" style="border:none;cursor:pointer;padding:6px 12px;border-radius:999px;font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif;background:${cardStyle==='B'?'#e8362a':'transparent'};color:${cardStyle==='B'?'#fff':'#5c756d'}">Story</button>
      </div>`;

    const cardA = `
      <div style="background:#ffffff;border-radius:20px;box-shadow:0 10px 32px rgba(20,60,50,.14);overflow:hidden">
        <div style="position:relative;height:110px;background:linear-gradient(135deg,#ffe8d9,#ffd4b8);display:flex;align-items:center;justify-content:center">
          <div style="font-size:28px">${menuEmoji(s)}</div>
          <div style="position:absolute;bottom:10px;left:12px;font-size:10px;font-weight:900;letter-spacing:.08em;color:#8a5a3a">MY TASTE PICK</div>
          <div style="position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:5px;background:#fff;border-radius:999px;padding:5px 10px;font-size:11px;font-weight:700;color:${info.color}">${menuEmoji(s)} ${info.label} <span style="color:#93a8a2;font-weight:500">${info.labelEn}</span></div>
          <button onclick="toggleBookmark(${s.id})" style="position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;background:${bm?'#e8362a':'#fff'};color:${bm?'#fff':'#e8362a'};font-size:14px;box-shadow:0 3px 10px rgba(20,60,50,.15)">${bm?'♥':'♡'}</button>
        </div>
        <div style="padding:14px 16px 16px;display:flex;flex-direction:column;gap:10px">
          <div style="font-size:17px;font-weight:900;color:#1c352e">${s.name}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${tags.map(t=>`<span style="background:#fdf0e4;color:#8a5a3a;font-size:11px;font-weight:500;padding:3px 9px;border-radius:999px">${t}</span>`).join('')}
          </div>
          <div style="display:flex;align-items:center;gap:14px">
            <div style="font-size:12px;font-weight:700;color:#e8362a">📍 ${dist}m</div>
            <div style="font-size:12px;color:#5c756d">🚶 도보 약 ${walk}분</div>
          </div>
        </div>
      </div>`;

    const cardB = `
      <div style="background:#fff8f0;border-radius:22px;box-shadow:0 10px 32px rgba(140,30,20,.18);overflow:hidden;border:3px solid #e8362a">
        <div style="background:#e8362a;padding:10px 16px;display:flex;align-items:center;gap:8px">
          <div style="font-family:'Pretendard',sans-serif;font-size:15px;font-weight:900;color:#fff;letter-spacing:.7px">HONGDAE STORY</div>
        </div>
        <div style="padding:14px 16px 16px;display:flex;flex-direction:column;gap:11px">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#ffe3cf,#ffd0b5);display:flex;align-items:center;justify-content:center;font-size:22px;flex:none;border:2px dashed #f0a080">${menuEmoji(s)}</div>
            <div style="font-size:17px;font-weight:900;color:#6b1510;flex:1">${s.name}</div>
          </div>
          <div style="background:#fff0e6;border-radius:12px;padding:9px 10px">
            <div style="font-size:10px;font-weight:900;color:#a43a2d;letter-spacing:.06em;margin-bottom:6px">STORY &amp; CERTIFICATION</div>
            <div style="display:flex;gap:5px;flex-wrap:wrap">
              ${storyTags.map(t=>`<span style="background:#fff;border:1.5px solid #f2b8ae;color:#c1382c;font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px">✦ ${t}</span>`).join('')}

          </div>
        </div>
      </div>`;

    dc.innerHTML = `
      <div class="detail-body" style="padding:14px">
        ${styleToggle}
        ${cardStyle === 'A' ? cardA : cardB}

            <a href="${kakaoUrl}" target="_blank" rel="noopener noreferrer" class="map-btn" style="flex:1;text-align:center;text-decoration:none;display:block">카카오맵 확인 ↗</a>

          </div>
          ${signatureMenuSection}` : ''}
      </div>`;
    return;
  }

  // 사라진 가게(폐업 확인됨): 상권분석 지표는 의미가 없으므로 다 빼고,
  // 그 가게를 좋아했던 사람들의 코멘트를 모으는 추모/추억 카드로 대체한다.
  if (s.status === 'closed') {
    const info = catInfo(s);
    const comments = loadComments(s.id);
    const commentsHtml = comments.length
      ? comments.map(c => `
          <div style="background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:8px">
            <div style="font-size:12px;color:var(--text);line-height:1.5">“${c.text}”</div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px">${c.date}</div>
          </div>`).join('')
      : `<div style="font-size:12px;color:var(--muted);text-align:center;padding:14px 0">아직 남겨진 코멘트가 없어요.<br>이 가게를 좋아했다면 첫 코멘트를 남겨주세요.</div>`;

    dc.innerHTML = `
      <div class="detail-body" style="padding:14px">
        <div style="background:#fff8f0;border-radius:22px;box-shadow:0 10px 32px rgba(140,30,20,.1);overflow:hidden;border:2px dashed #d8b8a8">
          <div style="background:#4a4038;padding:10px 16px;display:flex;align-items:center;gap:8px">

                <div style="font-size:17px;font-weight:900;color:#6b1510">${s.name}</div>

          </div>
        </div>

        <div class="section-title" style="margin-top:14px">이 가게를 좋아했던 사람들의 코멘트</div>

        <div style="display:flex;gap:6px;margin-top:8px">

            style="flex:1;padding:9px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;font-family:'Pretendard','Noto Sans KR',sans-serif"
            onkeydown="if(event.key==='Enter')submitComment(${s.id})">

        </div>
      </div>`;
    return;
  }

  const scoreColor = getScoreColor(s.score);
  const sameType = stores.filter(x=>x.type===s.type && x.rating!=null);
  const avgRating = sameType.length ? (sameType.reduce((a,x)=>a+x.rating,0)/sameType.length).toFixed(1) : s.rating;
  const verifiedStores = stores.filter(x=>x.status!=='unverified');
  const rankMonths = [...verifiedStores].sort((a,b)=>b.months-a.months).findIndex(x=>x.id===s.id)+1;
  const rentClass = s.rent > 400 ? 'bad' : s.rent > 250 ? 'warn' : 'good';
  const kakaoLink = s.kakaoUrl ? `<a href="${s.kakaoUrl}" target="_blank" style="font-size:10px;color:var(--accent2);text-decoration:none;">카카오맵에서 보기 ↗</a>` : '';
  const bm = !!bookmarks[s.id];

  dc.innerHTML = `
    <div class="detail-header" style="position:relative">
      <div class="detail-name">${s.name}</div>
      <button onclick="toggleBookmark(${s.id})" aria-label="저장한 장소에 추가" style="position:absolute;top:14px;right:42px;width:32px;height:32px;border-radius:50%;border:1px solid #e8362a;cursor:pointer;background:${bm?'#e8362a':'var(--surface2)'};color:#fff;font-size:15px">${bm?'♥':'♡'}</button>
      <div class="detail-sub">
        ${TYPES[s.type]||s.type}
        <span class="status-badge badge-${s.status}">${STATUS[s.status]||s.status}</span>
        ${s.score>=80?'<span style="font-size:10px;color:#e8362a">★ 우수업소</span>':''}
        ${kakaoLink}
      </div>
      ${s.address ? `<div style="font-size:11px;color:var(--muted);margin-top:4px">📍 ${s.address}</div>` : ''}
    </div>
    <div class="detail-body">

      <div>
        <div class="section-title">핵심 지표</div>
        <div class="metrics">
          <div class="metric"><div class="metric-val ${s.rating==null?'':(s.rating>=4.2?'good':s.rating>=3.5?'warn':'bad')}">${s.rating!=null?'★'+s.rating:'정보 없음'}</div><div class="metric-lbl">카카오 평점</div></div>
          <div class="metric"><div class="metric-val">${s.months!=null?s.months+'m':'정보 없음'}</div><div class="metric-lbl">운영 기간</div></div>
          <div class="metric"><div class="metric-val">${s.reviews!=null?s.reviews:'정보 없음'}</div><div class="metric-lbl">리뷰 수</div></div>
          <div class="metric"><div class="metric-val" style="color:${scoreColor}">${s.score!=null?s.score:'-'}</div><div class="metric-lbl">생존력 점수(참고용)</div></div>
        </div>
      </div>

      ${s.rent ? `
      <div>
        <div class="section-title">임대료 분석</div>
        <div class="metrics">
          <div class="metric"><div class="metric-val ${rentClass}">${s.rent}만</div><div class="metric-lbl">월 임대료 추정</div></div>
          <div class="metric"><div class="metric-val ${s.rent > s.rating * 80 ? 'bad' : 'good'}">${(s.rent/s.months).toFixed(1)}</div><div class="metric-lbl">월평균 임대부담</div></div>
        </div>
      </div>` : ''}

      <div>
        <div class="section-title">업소 인사이트</div>
        <div class="insight-card ${s.status==='closed'?'danger':s.status==='risk'?'warn':''}">
          <div class="insight-label">${s.status==='closed'?'🔴 폐점 분석':s.status==='risk'?'🟡 위험 신호':'🟢 운영 현황'}</div>
          ${s.insight}
          ${s.reason ? `<div style="margin-top:8px;font-size:11px;color:#e17055">▸ 폐점 원인: ${REASONS[s.reason]}</div>` : ''}
        </div>
      </div>

      <div>
        <div class="section-title">상권 내 비교</div>
        <div class="compare-row"><span class="compare-label">동종 업종 평균 평점</span><span class="compare-val ${s.rating!=null && s.rating>=avgRating?'up':'down'}">${s.rating!=null ? `${avgRating} 대비 ${s.rating>=avgRating?'▲':'▼'} ${Math.abs(s.rating-avgRating).toFixed(1)}` : '정보 없음'}</span></div>

        <div class="compare-row"><span class="compare-label">생존력 점수</span><span class="compare-val" style="color:${scoreColor}">${s.score}점 / 100</span></div>

    </div>
  `;
}


// ── FILTER / SEARCH ───────────────────────────────────
// ── 복수 카테고리 동시 선택 (예: 서교동 + 한식을 같이 켜면 두 조건 다 만족하는 곳만) ──
function toggleDetailFilter(key, btn) {
  if (activeDetailFilters.has(key)) {
    activeDetailFilters.delete(key);
    btn.classList.remove('on');
  } else {
    activeDetailFilters.add(key);
    btn.classList.add('on');
  }
  applyDetailFilterState();
}
// 한식/중식/일식/양식/글로벌 — 이제 여러 개를 동시에 선택할 수 있음(토글 방식)
function toggleCuisineFilter(value, btn) {
  const key = 'cuisine:' + value;
  if (activeDetailFilters.has(key)) {
    activeDetailFilters.delete(key);
    btn.classList.remove('on');
  } else {
    activeDetailFilters.add(key);
    btn.classList.add('on');
  }
  applyDetailFilterState();
}
function applyDetailFilterState() {
  // 다중 필터를 하나라도 켜면 "detailFilters" 모드로, 다 끄면 전체 보기로 돌아감
  currentFilter = activeDetailFilters.size > 0 ? 'detailFilters' : 'all';
  boundsFilter = null; // 이전에 '이 지역에서 검색'으로 좁혀둔 범위가 남아있으면 여기서도 매장이 안 보이므로 초기화
  if (activeDetailFilters.size === 0) {
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
    const allBtn = document.getElementById('chip-all');
    if (allBtn) allBtn.classList.add('on');
  }
  renderList();
}
function clearDetailFilters(btn) {
  activeDetailFilters.clear();
  currentFilter = 'all';
  boundsFilter = null;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  const allBtn = document.getElementById('chip-all');
  if (allBtn) allBtn.classList.add('on');
  renderList();
}
// 여러 필터를 동시에 골랐을 때: 같은 종류(kind)끼리는 하나만 맞아도 통과(OR),
// 종류가 다르면 그 종류들은 전부 만족해야 함(AND). 예) 한식+중식 선택 = 한식이거나 중식인 곳,
// 한식+서교동 선택 = 서교동에 있는 한식집만.
function matchesActiveDetailFilters(s) {
  if (activeDetailFilters.size === 0) return true;
  const groups = {};
  activeDetailFilters.forEach(key => {
    const kind = key.split(':')[0];
    (groups[kind] = groups[kind] || []).push(key);
  });
  return Object.values(groups).every(keys => keys.some(k => matchesDetailFilter(s, k)));
}
// 매장 s가 다중 필터 key 하나(예: 'cuisine:한식', 'dong:서교동', 'type:club', 'cert:michelin') 조건을 만족하는지 확인
function matchesDetailFilter(s, key) {
  const [kind, value] = key.split(':');
  if (kind === 'cuisine') {
    const label = cuisineLabel(s);
    return s.type === 'restaurant' && (value === '글로벌' ? label === '아시아식' : label === value);
  }
  if (kind === 'cafeSub') return s.type === 'cafe' && cafeSubType(s) === value;
  if (kind === 'barSub') return s.type === 'bar' && barSubType(s) === value;
  if (kind === 'dong') return s.dong === value;
  if (kind === 'type') return s.type === value;
  if (kind === 'cert') {
    if (value === 'hallOfFame') return (s.certifications || []).includes('홍대생 명예학식');
    if (value === 'michelin') return (s.certifications || []).some(c => c.includes('미쉐린'));
  }
  return false;
}

// 지도 위에 항상 떠있는 카테고리 바 전용 핸들러.
// 사이드바를 열지 않아도 바로 필터링되게 하는 게 목적이라, 한 번에 하나만 선택되는
// 단순한 방식으로 만듦(구글맵 상단 카테고리 버튼과 같은 방식).
function selectCategoryBar(key, btn) {
  activeDetailFilters.clear();
  boundsFilter = null;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  if (btn) btn.classList.add('on');
  if (key === 'club') { activeDetailFilters.add('type:club'); currentFilter = 'detailFilters'; }
  else if (key === 'hof') { activeDetailFilters.add('cert:hallOfFame'); currentFilter = 'detailFilters'; }
  else if (key === 'michelin') { activeDetailFilters.add('cert:michelin'); currentFilter = 'detailFilters'; }
  else if (key === 'gone') { currentFilter = 'gone'; }

  renderList();
}

function setFilter(type, btn) {
  currentFilter = type;
  activeDetailFilters.clear(); // 단일 카테고리를 새로 고르면 다중 선택 상태는 초기화
  boundsFilter = null; // 카테고리를 새로 고르면 '이 지역에서 검색'으로 좁혀둔 범위는 초기화
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));

// "카테고리 보기" 클릭 시: 전체 필터 적용 + 상세 카테고리 목록을 펼침/접음

function filterList() {

    : '<div class="search-empty">등록된 업체에서 찾지 못했어요.</div>';

function closePicker() {
