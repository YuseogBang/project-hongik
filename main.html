function showNearbyPicker(latlng, point) {
  closePicker();

  // Create picker positioned near click
  const mapWrap = document.querySelector('.map-wrap');
  const rect = mapWrap.getBoundingClientRect();

  pickerEl = document.createElement('div');
  pickerEl.className = 'place-picker';

  // Position: prefer right of click, flip left if near edge
  let left = point.x + 16;
  let top = point.y - 20;
  if (left + 270 > mapWrap.offsetWidth) left = point.x - 276;
  if (top + 320 > mapWrap.offsetHeight) top = mapWrap.offsetHeight - 320;
  if (top < 8) top = 8;

  pickerEl.style.left = left + 'px';
  pickerEl.style.top = top + 'px';
  pickerEl.innerHTML = `
    <div class="picker-header">
      <span>📍 업체 불러오기</span>
      <button class="picker-close" onclick="closePicker()">×</button>
    </div>
    <div class="picker-tabs">
      <button class="picker-tab active" id="ptab-nearby" onclick="switchPickerTab('nearby')">📡 주변 자동검색</button>
      <button class="picker-tab" id="ptab-search" onclick="switchPickerTab('search')">🔍 이름으로 검색</button>
    </div>
    <div id="picker-search-area" style="display:none">
      <div class="picker-search-box">
        <input type="text" id="picker-search-input" placeholder="업체명 입력 후 Enter"
          onkeydown="if(event.key==='Enter') runPickerSearch(pickerLatlng)">
        <button class="picker-search-btn" onclick="runPickerSearch(pickerLatlng)">검색</button>
      </div>
    </div>
    <div class="picker-list" id="picker-list">
      <div class="picker-loading">🔍 주변 검색 중...</div>
    </div>`;
  mapWrap.appendChild(pickerEl);
  pickerEl._latlng = latlng; // store for search tab

  // Search nearby with Kakao Places
  const ps = new kakao.maps.services.Places();
  const categories = ['FD6','CE7','BK9','MT1'];
  let allResults = [];
  let done = 0;

  categories.forEach(cat => {
    ps.categorySearch(cat, (data, status) => {
      done++;
      if (status === kakao.maps.services.Status.OK) allResults.push(...data);
      if (done === categories.length) renderPickerResults(allResults, latlng);
    }, { location: latlng, radius: 300, size: 10 });
  });
}

// 탭 전환
function switchPickerTab(tab) {
  document.getElementById('ptab-nearby').classList.toggle('active', tab === 'nearby');
  document.getElementById('ptab-search').classList.toggle('active', tab === 'search');
  document.getElementById('picker-search-area').style.display = tab === 'search' ? 'block' : 'none';
  if (tab === 'search') {
    document.getElementById('picker-list').innerHTML = '<div class="picker-empty">업체명을 입력하고 검색하세요</div>';
    setTimeout(() => document.getElementById('picker-search-input')?.focus(), 50);
  } else {
    // 다시 주변 검색
    document.getElementById('picker-list').innerHTML = '<div class="picker-loading">🔍 주변 검색 중...</div>';
    const latlng = pickerEl?._latlng;
    if (!latlng) return;
    const ps = new kakao.maps.services.Places();
    const categories = ['FD6','CE7','BK9','MT1'];
    let allResults = [], done = 0;
    categories.forEach(cat => {
      ps.categorySearch(cat, (data, status) => {
        done++;
        if (status === kakao.maps.services.Status.OK) allResults.push(...data);
        if (done === categories.length) renderPickerResults(allResults, latlng);
      }, { location: latlng, radius: 300, size: 10 });
    });
  }
}

function runPickerSearch(latlng) {
  const q = document.getElementById('picker-search-input')?.value.trim();
  if (!q) return;
  document.getElementById('picker-list').innerHTML = '<div class="picker-loading">🔍 검색 중...</div>';
  const ps = new kakao.maps.services.Places();
  // 이름으로 직접 검색할 땐 거리 제한을 두지 않는다 (동네가 다르면 못 찾는 문제 방지).
  // 결과는 renderPickerResults에서 클릭 지점 기준 거리순으로 정렬해서 보여준다.
  ps.keywordSearch(q, (data, status) => {
    if (status !== kakao.maps.services.Status.OK || data.length === 0) {
      document.getElementById('picker-list').innerHTML = `<div class="picker-empty">"${q}" 검색 결과가 없어요</div>`;
      return;
    }
    renderPickerResults(data, latlng);
  }, { size: 15 });
}

function renderPickerResults(data, latlng) {
  if (!pickerEl) return;
  const list = pickerEl.querySelector('#picker-list');

  // Deduplicate by place_id, sort by distance
  const seen = new Set();
  const unique = data.filter(p => { if (seen.has(p.id)) return false; seen.add(p.id); return true; });
  unique.sort((a,b) => parseFloat(a.distance||999) - parseFloat(b.distance||999));

  if (unique.length === 0) {
    list.innerHTML = '<div class="picker-empty">주변 업체를 찾지 못했어요.<br>다른 위치를 클릭해보세요.</div>';
    return;
  }

  const CAT_LABEL = { FD6:'음식점', CE7:'카페', BK9:'주점' };
  const CAT_COLOR = { FD6:'#e8362a', CE7:'#a9744f', BK9:'#f5a623' };

  list.innerHTML = unique.slice(0, 12).map(p => {
    const alreadyAdded = stores.some(s => s.kakaoId === p.id);
    const catLabel = CAT_LABEL[p.category_group_code] || '기타';
    const catColor = CAT_COLOR[p.category_group_code] || '#93a8a2';
    const dist = p.distance ? p.distance + 'm' : '';
    return `
    <div class="picker-item ${alreadyAdded ? 'opacity-50' : ''}" onclick="${alreadyAdded ? '' : `importPlace(${JSON.stringify(p).replace(/"/g,"'")})`}">
      <div class="picker-item-name">
        ${p.place_name}
        ${alreadyAdded ? '<span class="picker-item-badge" style="background:rgba(147,168,162,.2);color:#93a8a2">이미 추가됨</span>' : ''}
      </div>
      <div class="picker-item-meta">
        <span class="picker-item-badge" style="background:${catColor}22;color:${catColor}">${catLabel}</span>
        ${dist ? `<span style="margin-left:4px">${dist}</span>` : ''}
        ${p.road_address_name ? `<span style="margin-left:4px;opacity:.7">${p.road_address_name}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

// 사람이 카카오맵/네이버지도 링크를 눌러 직접 확인한 뒤 결과를 반영.
// API가 주지 않는 정보를 자동으로 지어내지 않고, 사용자의 확인 행위에만 의존한다.
function markVerified(id, status) {
  const s = stores.find(x => x.id === id);
  if (!s) return;
  s.status = status;
  // 평점/리뷰/운영기간/임대료 등은 여전히 미상이므로 null로 남겨두고,
  // 화면에서는 '정보 없음'으로 표시한다(있지도 않은 값을 추정해 넣지 않음).
  if (s.score == null) s.score = status === 'closed' ? 30 : 50; // 표시용 최소값, 실측 아님을 UI에 명시
  renderAll();
  updateStats();
  selectStore(id);
  showToast(status === 'open' ? `✅ "${s.name}" 영업중으로 반영됨` : `🚫 "${s.name}" 폐업/휴업으로 반영됨`);
}

function importPlace(p) {
  // Determine type from category
  const CAT_TYPE = { FD6:'restaurant', CE7:'cafe', BK9:'bar' };
  const type = CAT_TYPE[p.category_group_code] || 'retail';

  const address = p.road_address_name || p.address_name || '';

  // 주의: 카카오 로컬 API(keywordSearch/categorySearch)는 영업시간·실시간 영업 여부
  // 필드를 제공하지 않는다 (공식문서: https://developers.kakao.com/docs/ko/local/dev-guide).
  // 여기서 status를 'open'으로 임의 고정하면 실제로는 폐업/휴업인 곳도
  // 무조건 '영업중'으로 뜨는 오류가 생긴다. 실제 영업 여부는 알 수 없으므로
  // 정직하게 'unverified'(미확인)로 넣고, 카카오맵/네이버지도 링크로 사람이 직접 확인하게 한다.
  const newStore = {
    id: Date.now(),
    kakaoId: p.id,
    name: p.place_name,
    type,
    status: 'unverified',
    lat: parseFloat(p.y),
    lng: parseFloat(p.x),
    rating: null,
    reviews: null,
    months: null,
    rent: null,
    score: null,
    address,
    kakaoUrl: p.place_url || null,
    naverUrl: `https://map.naver.com/p/search/${encodeURIComponent(p.place_name + ' ' + address)}`,
    insight: `카카오맵에서 불러온 업체입니다. 주소: ${address}. 영업 여부는 카카오맵 API에서 제공되지 않아 아래 링크에서 직접 확인이 필요합니다.`,
    reason: null,
  };

  stores.push(newStore);
  trackAddition(newStore);
  closePicker();
  renderAll();
  updateStats();
  selectStore(newStore.id);

  // Show toast
  showToast(`✅ "${p.place_name}" 추가됨 — 영업 여부는 직접 확인해주세요`);
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = `position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
      background:#2a0a0a;border:1px solid #4a0e0e;color:#ffffff;
      font-size:12px;padding:10px 18px;border-radius:99px;z-index:999;
      box-shadow:0 4px 16px rgba(20,60,50,.3);transition:opacity .3s;white-space:nowrap;`;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 3000);
}

function searchNearby() {
  if (!map) return;
  const ps = new kakao.maps.services.Places();
  const center = map.getCenter();
  ps.keywordSearch('홍대 음식점', (data, status) => {
    if (status !== kakao.maps.services.Status.OK) return;
    data.slice(0,5).forEach(place => {
      const pos = new kakao.maps.LatLng(place.y, place.x);
      const infowindow = new kakao.maps.InfoWindow({
        content: `<div class="kakao-infobox"><div class="ib-name">${place.place_name}</div><div class="ib-addr">${place.road_address_name||place.address_name}</div></div>`,
        removable: true
      });
      const marker2 = new kakao.maps.Marker({ position: pos, map });
      kakao.maps.event.addListener(marker2, 'click', () => infowindow.open(map, marker2));
      markers.push(marker2);
    });
  }, { location: center, radius: 500 });
}

function resetView() {
  if (map) map.setCenter(new kakao.maps.LatLng(37.556670, 126.923610));
  if (map) map.setLevel(4);
  boundsFilter = null;
  const bar = document.getElementById('btn-search-area');
  if (bar) bar.style.display = 'none';
}

// '이 지역에서 검색' — 현재 지도 화면에 보이는 매장만 한 번 걸러서 결과에 반영.
// 지속되는 필터가 아니라 스냅샷이라, 카테고리를 바꾸거나 지도를 다시 옮기면 초기화됨.
function searchThisArea() {
  if (!map) return;
  boundsFilter = map.getBounds();
  renderList();
  openResultsModal();
  const bar = document.getElementById('btn-search-area');
  if (bar) bar.style.display = 'none'; // 다음에 지도를 또 움직이기 전까진 다시 안 뜸
  if (typeof showToast === 'function') showToast('현재 화면에 보이는 매장만 표시했어요');
}

// ── MODAL ─────────────────────────────────────────────
function openModal(defaultStatus) {
  document.getElementById('modal').style.display = 'flex';
  // Default to Hongdae center
  document.getElementById('f-lat').value = '37.556670';
  document.getElementById('f-lng').value = '126.923610';
  if (defaultStatus) document.getElementById('f-status').value = defaultStatus;
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }

function addStore() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return alert('상호명을 입력해주세요.');
  const lat = parseFloat(document.getElementById('f-lat').value) || 37.556670;
  const lng = parseFloat(document.getElementById('f-lng').value) || 126.923610;
  const months = parseInt(document.getElementById('f-months').value) || null;
  const status = document.getElementById('f-status').value;
  const closedYear = document.getElementById('f-closed-year').value.trim();
  const reporter = document.getElementById('f-reporter').value.trim();
  const memoText = document.getElementById('f-insight').value.trim();

  // 평점/리뷰/임대료 데이터가 없으니(실제로 알 수 없는 값), 억지로 점수를 만들어내지 않는다.
  const newStore = {
    id: Date.now(), name, type: document.getElementById('f-type').value,
    status, lat, lng, rating: null, reviews: null, months, rent: null, score: null,
    insight: memoText || '아직 제보된 내용이 없어요.',
    signatureMenu: document.getElementById('f-signature-menu').value || '',
    reason: document.getElementById('f-reason').value || null,
    // "사라진 가게" 큐레이션에서 보여줄 추억 텍스트
    memory: status === 'closed' ? (memoText || null) : null,
    closedYear: closedYear || null,
    reporter: reporter || null,
  };
  stores.push(newStore);
  trackAddition(newStore);
  closeModal();
  renderAll();
  updateStats();
  selectStore(newStore.id);
}
</script>
